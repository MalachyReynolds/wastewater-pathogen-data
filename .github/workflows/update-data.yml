name: Update wastewater data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 2"  # Tuesdays 06:17 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download latest data
        run: python scripts/download_all.py || true
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sources.csv manifest.json download_failures.json data/raw
          git commit -m "Update wastewater data" || echo "No changes to commit"
          git push
